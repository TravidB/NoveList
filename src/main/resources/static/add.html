<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Novel – NoveList</title>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode"></button>
    <div class="container">
        <div class="nav"><a href="/index.html">← Back to Home</a></div>
        <h1>NoveList</h1>
        <h2>Add Novel</h2>

        <form id="addForm">
            <div class="form-group">
                <label for="title">Novel Name</label>
                <input type="text" id="title" placeholder="e.g. The Great Gatsby" required>
            </div>
            <div class="form-group">
                <label for="author">Author Name</label>
                <input type="text" id="author" placeholder="e.g. F. Scott Fitzgerald" required>
            </div>
            <div class="form-group">
                <label>Progress Tracker</label>
                <div class="radio-group">
                    <label><input type="radio" name="progressType" value="CHAPTER" checked> Chapter</label>
                    <label><input type="radio" name="progressType" value="PAGE"> Page</label>
                </div>
            </div>
            <div class="form-group">
                <label for="progress" id="progressLabel">Current Chapter</label>
                <input type="number" id="progress" min="0" value="0">
            </div>
            <div class="form-group">
                <label>Cover Image <span style="font-weight:normal;color:#a08060;">(optional)</span></label>
                <input type="file" id="coverFile" accept="image/*" class="file-input">
                <span class="paste-hint">or press Ctrl+V anywhere to paste a screenshot</span>
                <img id="coverPreview" class="cover-preview" style="display:none;" alt="preview">
                <button type="button" id="removeCover" class="btn danger remove-cover-btn" style="display:none;" onclick="removeCover()">Remove Image</button>
                <input type="hidden" id="coverUrl">
            </div>
            <button type="submit" class="btn">Save Novel</button>
        </form>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const radios = document.querySelectorAll('input[name="progressType"]');
        const progressLabel = document.getElementById('progressLabel');

        radios.forEach(r => r.addEventListener('change', () => {
            progressLabel.textContent = r.value === 'CHAPTER' ? 'Current Chapter' : 'Current Page';
        }));

        async function uploadCover(file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/covers', { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('coverUrl').value = data.url;
                const preview = document.getElementById('coverPreview');
                preview.src = data.url;
                preview.style.display = 'block';
                document.getElementById('removeCover').style.display = 'inline-block';
            } else {
                const err = await res.json().catch(() => ({}));
                showToast('Upload failed: ' + (err.error || res.status));
            }
        }

        function removeCover() {
            document.getElementById('coverUrl').value = '';
            document.getElementById('coverFile').value = '';
            const preview = document.getElementById('coverPreview');
            preview.src = '';
            preview.style.display = 'none';
            document.getElementById('removeCover').style.display = 'none';
        }

        document.getElementById('coverFile').addEventListener('change', (e) => {
            if (e.target.files[0]) uploadCover(e.target.files[0]);
        });

        document.addEventListener('paste', (e) => {
            const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
            if (item) uploadCover(item.getAsFile());
        });

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const novel = {
                title: document.getElementById('title').value.trim(),
                author: document.getElementById('author').value.trim(),
                progressType: document.querySelector('input[name="progressType"]:checked').value,
                progress: parseInt(document.getElementById('progress').value) || 0,
                coverUrl: document.getElementById('coverUrl').value.trim() || null
            };

            const res = await fetch('/api/novels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novel)
            });

            if (res.ok) {
                window.location.href = '/browse.html';
            } else {
                showToast('Something went wrong. Please try again.');
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
