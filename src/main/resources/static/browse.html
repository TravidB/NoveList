<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Novels – NoveList</title>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode"></button>
    <div class="container">
        <div class="nav"><a href="/index.html">← Back to Home</a></div>
        <h1>NoveList</h1>
        <h2>Your Novels</h2>

        <a href="/add.html" class="btn secondary" style="margin-bottom:24px;">+ Add Novel</a>

        <div id="novelList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let activeEditId = null;

        document.addEventListener('paste', (e) => {
            if (activeEditId === null) return;
            const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
            if (item) uploadEditCover({ files: [item.getAsFile()] }, activeEditId);
        });

        async function loadNovels() {
            const res = await fetch('/api/novels');
            const novels = await res.json();
            const list = document.getElementById('novelList');

            if (novels.length === 0) {
                list.innerHTML = '<p class="empty-state">No novels yet. Add one to get started!</p>';
                return;
            }

            list.innerHTML = novels.map(n => cardHtml(n)).join('');
        }

        const TAGS = ['Fiction','Romance','Action','Mystery','Horror','Fantasy','Sci-Fi','Adventure','Comedy','Drama','Thriller','Historical','Cultivation','Xianxia','Slice of Life','Supernatural','Psychological','Sports','Martial Arts','Isekai','Tragedy','School Life','Magic','Harem','Mecha'];

        function tagsHtml(tags) {
            if (!tags) return '';
            const list = tags.split(',').filter(t => t);
            if (list.length === 0) return '';
            const MAX = 4;
            let html = list.map((t, i) =>
                `<span class="tag${i >= MAX ? ' tag-hidden' : ''}">${escapeHtml(t)}</span>`
            ).join('');
            if (list.length > MAX) {
                html += `<span class="tag-more" onclick="expandTags(this)">+${list.length - MAX} more</span>`;
            }
            return html;
        }

        function expandTags(el) {
            el.parentElement.querySelectorAll('.tag-hidden').forEach(t => t.classList.remove('tag-hidden'));
            el.remove();
        }

        function tagPickerHtml(id, currentTags) {
            const selected = currentTags ? currentTags.split(',').filter(t => t) : [];
            return TAGS.map(tag => {
                const active = selected.includes(tag) ? ' selected' : '';
                return `<button type="button" class="tag-pick${active}" onclick="toggleEditTag(this,${id})">${tag}</button>`;
            }).join('');
        }

        function toggleEditTag(btn, id) {
            btn.classList.toggle('selected');
            const selected = [...document.querySelectorAll(`#edit-tag-picker-${id} .tag-pick.selected`)].map(b => b.textContent);
            document.getElementById(`edit-tags-${id}`).value = selected.join(',');
        }

        function starsHtml(rating) {
            return Array.from({length: 5}, (_, i) =>
                `<span class="star-display${i < rating ? ' filled' : ''}">★</span>`
            ).join('');
        }

        const PLACEHOLDER_HTML = `<div class="card-cover cover-placeholder"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#c4a882" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`;

        function showCoverFallback(el) { el.outerHTML = PLACEHOLDER_HTML; }

        function coverHtml(coverUrl) {
            if (coverUrl) {
                return `<img class="card-cover" src="${escapeHtml(coverUrl)}" alt="cover" onerror="showCoverFallback(this)">`;
            }
            return PLACEHOLDER_HTML;
        }

        function cardHtml(n) {
            return `
                <div class="card" id="card-${n.id}"
                    data-title="${escapeHtml(n.title)}"
                    data-author="${escapeHtml(n.author)}"
                    data-progress-type="${n.progressType}"
                    data-progress="${n.progress}"
                    data-cover-url="${escapeHtml(n.coverUrl || '')}"
                    data-tags="${escapeHtml(n.tags || '')}"
                    data-rating="${n.rating || 0}">
                    ${coverHtml(n.coverUrl)}
                    <div class="card-info">
                        <div class="card-tags">${tagsHtml(n.tags)}</div>
                        <h3>${escapeHtml(n.title)}</h3>
                        <p>by ${escapeHtml(n.author)}</p>
                        <p>${n.progressType === 'CHAPTER' ? 'Chapter' : 'Page'} ${n.progress}</p>
                        <div class="card-stars">${starsHtml(n.rating || 0)}</div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button class="btn secondary" style="width:auto;padding:8px 16px;margin:0;"
                            onclick="showEditForm(${n.id})">Edit</button>
                        <button class="btn danger" style="width:auto;padding:8px 16px;margin:0;"
                            onclick="deleteNovel(${n.id})">Remove</button>
                    </div>
                </div>`;
        }

        function showEditForm(id) {
            activeEditId = id;
            const card = document.getElementById(`card-${id}`);
            const title = card.dataset.title;
            const author = card.dataset.author;
            const progressType = card.dataset.progressType;
            const progress = card.dataset.progress;
            const coverUrl = card.dataset.coverUrl;
            const tags = card.dataset.tags || '';
            const rating = parseInt(card.dataset.rating) || 0;
            document.getElementById(`card-${id}`).outerHTML = `
                <div class="card" id="card-${id}">
                    <div style="width:100%;">
                        <div class="form-group">
                            <label>Novel Name</label>
                            <input type="text" id="edit-title-${id}" value="${title}">
                        </div>
                        <div class="form-group">
                            <label>Author Name</label>
                            <input type="text" id="edit-author-${id}" value="${author}">
                        </div>
                        <div class="form-group">
                            <label>Progress Tracker</label>
                            <div class="radio-group">
                                <label><input type="radio" name="edit-type-${id}" value="CHAPTER" ${progressType === 'CHAPTER' ? 'checked' : ''}> Chapter</label>
                                <label><input type="radio" name="edit-type-${id}" value="PAGE" ${progressType === 'PAGE' ? 'checked' : ''}> Page</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label id="edit-prog-label-${id}">${progressType === 'CHAPTER' ? 'Current Chapter' : 'Current Page'}</label>
                            <input type="number" id="edit-progress-${id}" min="0" value="${progress}">
                        </div>
                        <div class="form-group">
                            <label>Cover Image <span style="font-weight:normal;color:#a08060;">(optional)</span></label>
                            ${coverUrl ? `<img id="edit-cover-preview-${id}" class="cover-preview" src="${coverUrl}" alt="preview">` : `<img id="edit-cover-preview-${id}" class="cover-preview" style="display:none;" alt="preview">`}
                            ${coverUrl ? `<button type="button" id="edit-remove-cover-${id}" class="btn danger remove-cover-btn" onclick="removeEditCover(${id})">Remove Image</button>` : `<button type="button" id="edit-remove-cover-${id}" class="btn danger remove-cover-btn" style="display:none;" onclick="removeEditCover(${id})">Remove Image</button>`}
                            <input type="file" accept="image/*" class="file-input" onchange="uploadEditCover(this, ${id})">
                            <span class="paste-hint">or press Ctrl+V to paste a screenshot</span>
                            <input type="hidden" id="edit-cover-${id}" value="${coverUrl}">
                        </div>
                        <div class="form-group">
                            <label>Tags <span style="font-weight:normal;color:var(--text-muted);">(optional)</span></label>
                            <div class="tag-picker" id="edit-tag-picker-${id}">${tagPickerHtml(id, tags)}</div>
                            <input type="hidden" id="edit-tags-${id}" value="${escapeHtml(tags)}">
                        </div>
                        <div class="form-group">
                            <label>Rating <span style="font-weight:normal;color:var(--text-muted);">(optional — click a star, click again to clear)</span></label>
                            <div class="star-picker" id="edit-star-picker-${id}">
                                <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
                            </div>
                            <input type="hidden" id="edit-rating-${id}" value="0">
                        </div>
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button class="btn" style="width:auto;padding:8px 16px;margin:0;" onclick="saveEdit(${id})">Save</button>
                            <button class="btn secondary" style="width:auto;padding:8px 16px;margin:0;" onclick="loadNovels()">Cancel</button>
                        </div>
                    </div>
                </div>`;

            document.querySelectorAll(`input[name="edit-type-${id}"]`).forEach(r =>
                r.addEventListener('change', () => {
                    document.getElementById(`edit-prog-label-${id}`).textContent =
                        r.value === 'CHAPTER' ? 'Current Chapter' : 'Current Page';
                })
            );

            // Wire edit star picker
            let editRating = rating;
            document.getElementById(`edit-rating-${id}`).value = editRating;
            const editStars = document.querySelectorAll(`#edit-star-picker-${id} .star`);
            editStars.forEach((s, j) => s.classList.toggle('filled', j < editRating));
            editStars.forEach((star, i) => {
                star.addEventListener('click', () => {
                    const clicked = i + 1;
                    editRating = editRating === clicked ? 0 : clicked;
                    editStars.forEach((s, j) => s.classList.toggle('filled', j < editRating));
                    document.getElementById(`edit-rating-${id}`).value = editRating;
                });
                star.addEventListener('mouseenter', () => {
                    editStars.forEach((s, j) => s.classList.toggle('filled', j <= i));
                });
                star.addEventListener('mouseleave', () => {
                    editStars.forEach((s, j) => s.classList.toggle('filled', j < editRating));
                });
            });
        }

        function removeEditCover(id) {
            document.getElementById(`edit-cover-${id}`).value = '';
            const preview = document.getElementById(`edit-cover-preview-${id}`);
            preview.src = '';
            preview.style.display = 'none';
            document.getElementById(`edit-remove-cover-${id}`).style.display = 'none';
        }

        async function uploadEditCover(input, id) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/covers', { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                document.getElementById(`edit-cover-${id}`).value = data.url;
                const preview = document.getElementById(`edit-cover-preview-${id}`);
                preview.src = data.url;
                preview.style.display = 'block';
                document.getElementById(`edit-remove-cover-${id}`).style.display = 'inline-block';
            } else {
                const err = await res.json().catch(() => ({}));
                showToast('Upload failed: ' + (err.error || res.status));
            }
        }

        async function saveEdit(id) {
            const novel = {
                title: document.getElementById(`edit-title-${id}`).value.trim(),
                author: document.getElementById(`edit-author-${id}`).value.trim(),
                progressType: document.querySelector(`input[name="edit-type-${id}"]:checked`).value,
                progress: parseInt(document.getElementById(`edit-progress-${id}`).value) || 0,
                coverUrl: document.getElementById(`edit-cover-${id}`).value.trim() || null,
                tags: document.getElementById(`edit-tags-${id}`).value || null,
                rating: parseInt(document.getElementById(`edit-rating-${id}`).value) || 0
            };
            const res = await fetch(`/api/novels/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novel)
            });
            if (res.ok) {
                activeEditId = null;
                const updated = await res.json();
                document.getElementById(`card-${id}`).outerHTML = cardHtml(updated);
                showToast('Novel updated.');
            } else {
                showToast('Something went wrong.');
            }
        }

        async function deleteNovel(id) {
            const res = await fetch(`/api/novels/${id}`, { method: 'DELETE' });
            if (res.ok) {
                document.getElementById(`card-${id}`).remove();
                if (!document.querySelector('.card')) {
                    document.getElementById('novelList').innerHTML =
                        '<p class="empty-state">No novels yet. Add one to get started!</p>';
                }
                showToast('Novel removed.');
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        loadNovels();
    </script>
</body>
</html>
